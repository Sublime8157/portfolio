<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Portfolio Message</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f0;
      font-family: Georgia, &quot;Times New Roman&quot;, serif;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f4f0; padding: 40px 16px"
    >
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="max-width: 600px; width: 100%"
          >
            <!-- Header -->
            <tr>
              <td
                style="
                  background-color: #1a1a1a;
                  padding: 36px 40px 28px;
                  border-radius: 12px 12px 0 0;
                "
              >
                <p
                  style="
                    margin: 0 0 6px;
                    font-family: &quot;Courier New&quot;, Courier, monospace;
                    font-size: 11px;
                    letter-spacing: 3px;
                    color: #888;
                    text-transform: uppercase;
                  "
                >
                  Portfolio
                </p>
                <h1
                  style="
                    margin: 0;
                    font-size: 24px;
                    font-weight: normal;
                    color: #ffffff;
                    letter-spacing: -0.5px;
                  "
                >
                  New message received
                </h1>
              </td>
            </tr>

            <!-- Divider accent -->
            <tr>
              <td
                style="
                  background-color: #c8f564;
                  height: 3px;
                  line-height: 3px;
                  font-size: 1px;
                "
              >
                &nbsp;
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="background-color: #ffffff; padding: 36px 40px">
                <!-- Sender info -->
                <table
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  style="margin-bottom: 28px"
                >
                  <tr>
                    <td
                      style="
                        background-color: #f8f8f5;
                        border-radius: 8px;
                        padding: 20px 24px;
                      "
                    >
                      <p
                        style="
                          margin: 0 0 4px;
                          font-family:
                            &quot;Courier New&quot;, Courier, monospace;
                          font-size: 10px;
                          letter-spacing: 2px;
                          color: #999;
                          text-transform: uppercase;
                        "
                      >
                        From
                      </p>
                      <p
                        style="
                          margin: 0;
                          font-size: 20px;
                          font-weight: normal;
                          color: #1a1a1a;
                        "
                      >
                        {{name}}
                      </p>
                    </td>
                  </tr>
                </table>

                <!-- Subject -->
                <p
                  style="
                    margin: 0 0 6px;
                    font-family: &quot;Courier New&quot;, Courier, monospace;
                    font-size: 10px;
                    letter-spacing: 2px;
                    color: #999;
                    text-transform: uppercase;
                  "
                >
                  Subject
                </p>
                <p
                  style="
                    margin: 0 0 28px;
                    font-size: 17px;
                    color: #1a1a1a;
                    font-weight: bold;
                    border-bottom: 1px solid #ebebeb;
                    padding-bottom: 24px;
                  "
                >
                  {{subject}}
                </p>

                <!-- Message -->
                <p
                  style="
                    margin: 0 0 12px;
                    font-family: &quot;Courier New&quot;, Courier, monospace;
                    font-size: 10px;
                    letter-spacing: 2px;
                    color: #999;
                    text-transform: uppercase;
                  "
                >
                  Message
                </p>
                <p
                  style="
                    margin: 0;
                    font-size: 15px;
                    line-height: 1.75;
                    color: #333;
                    white-space: pre-line;
                  "
                >
                  {{message}}
                </p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                style="
                  background-color: #f8f8f5;
                  padding: 24px 40px;
                  border-radius: 0 0 12px 12px;
                  border-top: 1px solid #ebebeb;
                "
              >
                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td>
                      <p
                        style="
                          margin: 0;
                          font-family:
                            &quot;Courier New&quot;, Courier, monospace;
                          font-size: 11px;
                          color: #aaa;
                        "
                      >
                        This message was sent via your portfolio contact form.
                      </p>
                    </td>
                    <td align="right">
                      <p
                        style="
                          margin: 0;
                          font-family:
                            &quot;Courier New&quot;, Courier, monospace;
                          font-size: 11px;
                          color: #aaa;
                        "
                      >
                        {{timestamp}}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
